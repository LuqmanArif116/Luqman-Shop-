<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dark Shop Official</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* HEADER */
header{
background:#111;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* AUTH */
.auth{
max-width:400px;
margin:60px auto;
background:#161616;
padding:25px;
border-radius:12px;
}

input,select,button,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
background:#00ff99;
font-weight:bold;
cursor:pointer;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:10px;
}

.nav button{
background:none;
color:white;
border:none;
}

/* PAGES */
.page{padding:15px}
.hidden{display:none}

/* CARD */
.card{
background:#1c1c1c;
padding:10px;
margin:10px 0;
border-radius:10px;
}

.small{font-size:12px;color:#aaa}

</style>
</head>

<body>

<header>🔥 Dark Shop Official</header>

<!-- AUTH -->
<div id="auth" class="auth">
<h3>Login / Signup</h3>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- HOME -->
<div class="page" id="home">
<h3>Products</h3>
<div id="products"></div>
</div>

<!-- SELL -->
<div class="page hidden" id="sell">
<h3>Sell Product</h3>

<select id="platform">
<option>Instagram</option>
<option>Facebook</option>
<option>TikTok</option>
<option>YouTube</option>
</select>

<input id="price" placeholder="Price">
<textarea id="desc" placeholder="Description"></textarea>

<button onclick="addProduct()">Add Product</button>
</div>

<!-- ORDERS -->
<div class="page hidden" id="orders">
<h3>My Orders</h3>
<div id="orderList"></div>
</div>

<!-- DISPUTE -->
<div class="page hidden" id="dispute">
<h3>Dispute System</h3>

<input id="disputeText" placeholder="Write issue">
<button onclick="openDispute()">Open Dispute</button>

<div id="disputeList"></div>
</div>

<!-- PROFILE -->
<div class="page hidden" id="profile">
<h3>Profile</h3>
<p id="userInfo"></p>
</div>

</div>

<!-- NAV -->
<div class="nav hidden" id="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('sell')">Sell</button>
<button onclick="show('orders')">Orders</button>
<button onclick="show('dispute')">Dispute</button>
<button onclick="show('profile')">Profile</button>
</div>

<script>

/* STORAGE */
let users = JSON.parse(localStorage.getItem("users")) || {};
let products = JSON.parse(localStorage.getItem("products")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let disputes = JSON.parse(localStorage.getItem("disputes")) || [];

let currentUser="";

/* SIGNUP */
function signup(){
if(users[email.value]){
alert("User already exists ❌");
return;
}
users[email.value]=pass.value;
localStorage.setItem("users",JSON.stringify(users));
alert("Account Created ✔");
}

/* LOGIN */
function login(){
if(users[email.value] && users[email.value]==pass.value){

currentUser=email.value;

auth.classList.add("hidden");
app.classList.remove("hidden");
nav.classList.remove("hidden");

userInfo.innerText="User: "+currentUser;

loadProducts();
loadOrders();
loadDisputes();

}else{
alert("Wrong login ❌");
}
}

/* NAV */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

/* ADD PRODUCT */
function addProduct(){
products.push({
user:currentUser,
platform:platform.value,
price:price.value,
desc:desc.value
});

localStorage.setItem("products",JSON.stringify(products));
loadProducts();
alert("Product Added ✔");
}

/* LOAD PRODUCTS */
function loadProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<b>${p.platform}</b><br>
${p.price} Rs<br>
<small class="small">${p.desc}</small><br>
<button onclick="buy(${i})">Buy</button>
</div>
`;
});
document.getElementById("products").innerHTML=html;
}

/* BUY */
function buy(i){
orders.push(products[i]);
localStorage.setItem("orders",JSON.stringify(orders));
alert("Purchased ✔");
loadOrders();
}

/* ORDERS */
function loadOrders(){
let html="";
orders.forEach(o=>{
html+=`
<div class="card">
<b>${o.platform}</b><br>
${o.price}
</div>
`;
});
orderList.innerHTML=html;
}

/* DISPUTE */
function openDispute(){
disputes.push({
user:currentUser,
text:disputeText.value
});

localStorage.setItem("disputes",JSON.stringify(disputes));

loadDisputes();
alert("Dispute Opened ✔");
}

function loadDisputes(){
let html="";
disputes.forEach(d=>{
html+=`
<div class="card">
${d.user}<br>
<small>${d.text}</small>
</div>
`;
});
disputeList.innerHTML=html;
}

</script>

</body>
</html>

products.forEach((p,i)=>{

</script>

</body>
</html>
