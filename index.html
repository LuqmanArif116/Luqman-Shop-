<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dark Shop Official</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

header{
background:#111;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.auth{
max-width:380px;
margin:50px auto;
background:#161616;
padding:20px;
border-radius:10px;
}

input,select,button,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
background:#00ff99;
font-weight:bold;
cursor:pointer;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:10px;
}

.nav button{
background:none;
color:white;
border:none;
}

.page{padding:15px}
.hidden{display:none}

.card{
background:#1c1c1c;
padding:10px;
margin:10px 0;
border-radius:10px;
}

</style>
</head>

<body>

<header>🔥 Dark Shop Official</header>

<!-- AUTH -->
<div id="auth" class="auth">
<h3>Login / Signup</h3>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- HOME -->
<div class="page" id="home">
<h3>Products</h3>
<div id="productList"></div>
</div>

<!-- SELL -->
<div class="page hidden" id="sell">
<h3>Sell Product</h3>

<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<textarea id="desc" placeholder="Description"></textarea>

<select id="category">
<option>Facebook</option>
<option>Instagram</option>
<option>TikTok</option>
<option>YouTube</option>
</select>

<button onclick="addProduct()">Add Product</button>
</div>

<!-- ORDERS -->
<div class="page hidden" id="orders">
<h3>Orders</h3>
<div id="orderList"></div>
</div>

<!-- WALLET -->
<div class="page hidden" id="wallet">
<h3>Wallet</h3>

<p id="bal">Balance: 0 USD</p>

<input id="wamount" placeholder="Withdraw Amount">
<button onclick="withdraw()">Withdraw</button>

</div>

<!-- DISPUTE -->
<div class="page hidden" id="dispute">
<h3>Disputes</h3>

<input id="dtext" placeholder="Issue">
<button onclick="openDispute()">Open Dispute</button>

<div id="disputeList"></div>
</div>

<!-- PROFILE -->
<div class="page hidden" id="profile">
<h3>Profile</h3>
<p id="userInfo"></p>
</div>

</div>

<!-- NAV -->
<div class="nav hidden" id="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('sell')">Sell</button>
<button onclick="show('orders')">Orders</button>
<button onclick="show('wallet')">Wallet</button>
<button onclick="show('dispute')">Dispute</button>
<button onclick="show('profile')">Profile</button>
</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = "";
let balance = 100; // demo starting balance

// SIGNUP
function signup(){
auth.createUserWithEmailAndPassword(email.value, pass.value)
.then(()=>alert("Account Created ✔"));
}

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value, pass.value)
.then(user=>{
currentUser = user.user.email;

auth.classList.add("hidden");
app.classList.remove("hidden");
nav.classList.remove("hidden");

userInfo.innerText = currentUser;

loadProducts();
loadOrders();
loadDisputes();
updateBalance();
});
}

// NAV
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

// ADD PRODUCT
function addProduct(){

db.collection("products").add({
title:title.value,
price:price.value,
desc:desc.value,
category:category.value,
owner:currentUser,
time:Date.now()
});

alert("Product Added ✔");
loadProducts();
}

// LOAD PRODUCTS
function loadProducts(){

db.collection("products").onSnapshot(snap=>{
let html="";

snap.forEach(doc=>{
let p = doc.data();

html += `
<div class="card">
<b>${p.title}</b><br>
${p.price} USD<br>
<small>${p.desc}</small><br>
<i>${p.category}</i><br>

<button onclick="buy('${doc.id}')">BUY</button>
</div>
`;
});

productList.innerHTML = html;
});

}

// BUY
function buy(id){

db.collection("orders").add({
productId:id,
buyer:currentUser,
time:Date.now()
});

alert("Purchased ✔");
loadOrders();

}

// ORDERS
function loadOrders(){

db.collection("orders").onSnapshot(snap=>{
let html="";

snap.forEach(doc=>{
html+=`
<div class="card">
Order ID: ${doc.id}
</div>
`;
});

orderList.innerHTML=html;
});

}

// WALLET
function updateBalance(){
bal.innerText = "Balance: " + balance + " USD";
}

// WITHDRAW
function withdraw(){

let amt = parseInt(wamount.value);

if(amt > balance){
alert("Not enough balance ❌");
return;
}

balance -= amt;
updateBalance();

alert("Withdraw Request Sent ✔ (pending)");
}

// DISPUTE
function openDispute(){

db.collection("disputes").add({
user:currentUser,
issue:dtext.value,
time:Date.now()
});

alert("Dispute Opened ✔");
loadDisputes();

}

// LOAD DISPUTE
function loadDisputes(){

db.collection("disputes").onSnapshot(snap=>{
let html="";

snap.forEach(doc=>{
html+=`
<div class="card">
${doc.data().issue}
</div>
`;
});

disputeList.innerHTML=html;
});

}

</script>

</body>
                   </html>
